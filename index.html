<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>DimTheWeb</title>
</head>
<body>

  <!-- Noise overlay (Saturn-inspired) -->
  <div id="noiseOverlay"></div>

  <!-- Ambient particles -->
  <div id="particles"></div>
  <div id="fireflies"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="icons/icon32.png" alt="" class="app-icon" />
      <span class="app-title gradient-text-shift">DimTheWeb</span>
    </div>
    <div class="header-actions">
      <button id="lofiToggleBtn" class="icon-btn" title="Lo-Fi Player">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </button>
      <button id="settingsToggleBtn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Brightness Card -->
  <section class="card">
    <div class="card-header">
      <span class="section-label">
        <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        This Tab
      </span>
      <span class="value-badge" id="brightnessValue">100%</span>
    </div>
    <div class="slider-group">
      <div class="sun-icon" id="sunIcon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line class="ray" x1="12" y1="12" x2="12" y2="2" />
          <line class="ray" x1="12" y1="12" x2="12" y2="22" />
          <line class="ray" x1="12" y1="12" x2="2" y2="12" />
          <line class="ray" x1="12" y1="12" x2="22" y2="12" />
          <line class="ray" x1="12" y1="12" x2="4.1" y2="4.1" />
          <line class="ray" x1="12" y1="12" x2="19.9" y2="19.9" />
          <line class="ray" x1="12" y1="12" x2="4.1" y2="19.9" />
          <line class="ray" x1="12" y1="12" x2="19.9" y2="4.1" />
          <circle cx="12" cy="12" r="5" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <input type="range" id="brightnessSlider" min="0" max="100" value="100" step="1" />
    </div>
    <div class="card-actions">
      <button id="resetBtn" class="btn btn-sm btn-ghost">Reset</button>
      <button id="syncBrightnessBtn" class="btn btn-sm btn-ghost" title="Apply to all tabs">Sync All</button>
    </div>
  </section>

  <!-- Quick Presets + Dark Mode -->
  <section class="card features-card">
    <div class="features-row">
      <button id="presetBtn1" class="feature-btn preset-slot" title="Left-click load, Right-click save">-</button>
      <button id="presetBtn2" class="feature-btn preset-slot" title="Left-click load, Right-click save">-</button>
      <button id="presetBtn3" class="feature-btn preset-slot" title="Left-click load, Right-click save">-</button>
    </div>
    <div class="features-row" style="margin-top:5px">
      <!-- Dark Mode as Saturn-style toggle -->
      <div class="feature-btn" id="darkModeRow" style="cursor:default;gap:8px;justify-content:space-between;padding:5px 10px">
        <span style="display:flex;align-items:center;gap:4px;color:var(--text-soft)">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Dark Mode
        </span>
        <label class="toggle-switch" id="darkModeToggle" style="pointer-events:auto;cursor:pointer">
          <input type="checkbox" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button id="presetSaveBtn" class="feature-btn" title="Save current brightness as named preset">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save
      </button>
    </div>
  </section>

  <!-- Lo-Fi Player Card -->
  <section class="card" id="lofiSection">
    <div class="card-header">
      <span class="card-label">
        <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Lo-Fi Player
        <span class="status-dot" id="lofiStatusDot"></span>
      </span>
      <span class="value-badge" id="nowPlayingLabel">Idle</span>
    </div>
    <div id="lofiBody" class="lofi-collapse">
      <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
      <div class="player-controls">
        <button id="playBtn" class="play-btn">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <polygon points="8,5 19,12 8,19"/>
          </svg>
        </button>
        <div class="volume-row">
          <svg class="slider-icon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor" opacity="0.4">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          <input type="range" id="volSlider" min="0" max="100" value="30" step="1" />
          <span class="vol-label" id="volDisplay">30</span>
        </div>
      </div>
      <div class="vol-source">
        Volume:
        <span class="vol-source-badge fixed" id="volModeBadge">Fixed 30</span>
        <span id="volScheduleInfo" style="display:none;color:var(--text-muted);font-size:10px;"></span>
      </div>
    </div>
  </section>

  <!-- Settings Panel -->
  <aside id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="settingsCloseBtn" class="icon-btn">&times;</button>
    </div>

    <section class="settings-section">
      <h3>Volume Mode</h3>
      <div class="toggle-group">
        <button class="toggle-btn active" id="modeFixed">Fixed</button>
        <button class="toggle-btn" id="modeScheduled">Scheduled</button>
      </div>
    </section>

    <section class="settings-section" id="fixedVolSection">
      <h3>Fixed Volume</h3>
      <div class="slider-group">
        <input type="range" id="fixedVolSlider" min="0" max="100" value="30" step="1" />
        <span class="vol-label" id="fixedVolDisplay">30</span>
      </div>
    </section>

    <section class="settings-section" id="scheduleSection" style="display:none;">
      <h3 style="margin-bottom:4px;">Schedule</h3>
      <div class="schedule-hint">Volume adjusts to the last entry before the current time. Entries wrap at midnight.</div>
      <div id="scheduleList" class="schedule-list"></div>
      <div class="add-schedule-row">
        <button id="addScheduleBtn" class="btn btn-sm btn-primary">+ Add Entry</button>
      </div>
    </section>

    <section class="settings-section">
      <h3>Stream Source</h3>
      <div class="stream-url-row">
        <input type="text" id="streamUrlInput" class="input-text" placeholder="Paste a lo-fi stream URL..." />
        <button id="applyStreamUrlBtn" class="btn btn-sm btn-ghost">Apply</button>
      </div>
    </section>

    <section class="settings-section">
      <h3>Named Presets</h3>
      <div id="presetList" class="preset-list"></div>
      <div class="preset-save-row">
        <input type="text" id="presetNameInput" class="input-text" placeholder="Preset name..." />
        <button id="savePresetBtn" class="btn btn-sm btn-primary">Save</button>
      </div>
    </section>
  </aside>

  <script src="script.js"></script>
</body>
</html>
